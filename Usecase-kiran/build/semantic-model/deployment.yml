version: v1alpha
name: sales-prformance-analysis-kb
layer: user
type: lens
tags:
  - lens
description: This semantic model provides comprehensive insights for product affinity analysis.
lens:
  compute: runnable-default
  secrets:
    - name: bitbucket-cred
      allKeys: true
  source:
    type: icebase
    name: postgresabc
  repo:
    url: https://github.com/Aadi-session/BTS-onboarding
    lensBaseDir: "E:\Kiran\MDF\Assignment\Assignment\BTS-onboarding\Usecase-kiran\build\semantic-model\models"
    syncFlags:
      - --ref=main

  api:   # optional
    replicas: 1 # optional
