version: v1
name: wf-customer-cross-sell
type: workflow
tags:
  - analytics
description: Build cross-sell recommendations from the customer_360_dataset.
workflow:
  dag:
    - name: dg-customer-360-cross-sell
      spec:
        tags:
          - analytics
        stack: flare:7.0
        compute: runnable-default
        stackSpec:
          job:
            explain: true
            inputs:
              - name: customer_data
                dataset: dataos://icebase:sujathaschema/customer_360_dataset?acl=r
                format: Iceberg
            outputs:
              - name: cross_sell
                dataset: dataos://icebase:sujathaschema/cross_sell_recommendations?acl=rw
                format: Iceberg
                title: Cross-sell recommendations
                options:
                  saveMode: overwrite
                  iceberg:
                    properties:
                      write.format.default: parquet
            steps:
              - sequence:
                  - name: build_customer_segments
                    sql: |
                      SELECT
                        customer_id,
                        CASE
                          WHEN COUNT(DISTINCT order_id) >= 10 THEN 'High Value'
                          WHEN COUNT(DISTINCT order_id) >= 3 THEN 'Medium Value'
                          ELSE 'Low Value'
                        END AS customer_segments
                      FROM customer_data
                      GROUP BY customer_id

                  - name: build_product_affinity
                    sql: |
                      SELECT
                        a.product_name AS product,
                        b.product_name AS recommended_product,
                        COUNT(*) AS affinity_score
                      FROM customer_data a
                      JOIN customer_data b
                        ON a.order_id = b.order_id
                      AND a.product_name < b.product_name
                      GROUP BY a.product_name, b.product_name

                  - name: cross_sell
                    sql: |
                      SELECT
                        c.customer_id,
                        cs.customer_segments,
                        CONCAT('Pair ', f.product, ' with ', f.recommended_product) AS cross_sell_recommendation
                      FROM customer_data c
                      LEFT JOIN build_customer_segments cs
                        ON c.customer_id = cs.customer_id
                      LEFT JOIN build_product_affinity f
                        ON c.product_name = f.product
                      WHERE c.customer_id IS NOT NULL
                        AND c.product_name IS NOT NULL