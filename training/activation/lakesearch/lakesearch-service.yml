name: pals
version: v1
type: service
tags:
  - service
  - dataos:type:resource
  - dataos:resource:service
  - dataos:layer:user
description: Lakesearch Service Simple Index Config
workspace: public
service:
  servicePort: 4080
  ingress:
    enabled: true
    stripPath: false
    path: /lakesearch/public:pals
    noAuthentication: true
  replicas: 1
  logLevel: 'INFO'
  compute: runnable-default
  envs:
    LAKESEARCH_SERVER_NAME: "public:pals"
    DATA_DIR: public/productaffinity/test02
    USER_MODULES_DIR: /etc/dataos/config
  persistentVolume:
    name: pap-volume
    directory: public/productaffinity/test02
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
  stack: lakesearch:1.0
  stackSpec:
    lakesearch:
      source:
        datasets:
          - name: customer
            dataset: dataos://lakehouse:customer_relationship_management/customer_data

          - name: cross_sell
            dataset: dataos://lakehouse:customer_relationship_management/cross_sell_recommendations
            
      index_tables:
        - name: customer
          description: "index for cross sell recommendations"
          tags:
            - customer
          properties:
            morphology: stem_en
          columns:
            - name: education
              type: keyword
            - name: birth_year
              type: bigint
            - name: income
              type: float
            - name: customer_id
              type: bigint
            - name: country
              type: text
            - name: id
              description: "mapped to row_num"
              tags:
                - identifier
              type: bigint
        - name: cross_sell
          description: "index for cross sell recommendations"
          tags:
            - cross_sell
          properties:
            morphology: stem_en
          columns:
            - name: customer_id
              type: bigint
            - name: customer_segments
              type: text
            - name: customer_segments_key
              type: keyword
            - name: cross_sell_recommendations
              type: text
            - name: id
              description: "mapped to row_num"
              tags:
                - identifier
              type: bigint
      indexers:
        - index_table: customer
          base_sql: |
            SELECT 
              customer_id as id,
              customer_id,
              birth_year,
              education,
              country,
              income
            FROM 
              customer
          options:
            start: 1
            step: 100
            batch_sql: |
              WITH base AS (
                  {base_sql}
              ) start: 1
            step: 1000
            batch_sql: |
              WITH base AS (
                  {base_sql}
              ) SELECT 
                * 
              FROM 
                base 
              WHERE 
                customer_id >= {start} AND customer_id < {end}
            throttle:
              min: 1000
              max: 6000
              factor: 1.2
              jitter: true

        - index_table: cross_sell
          base_sql: |
            SELECT 
              cast(customer_id as bigint) as id,
              cast(customer_id as bigint) as customer_id,
              customer_segments,
              customer_segments as customer_segments_key,
              cross_sell_recommendations
            FROM 
              cross_sell
          options:
            start: 1
            step: 100
            batch_sql: |
              WITH base AS (
                  {base_sql}
              ) start: 1
            step: 1000
            batch_sql: |
              WITH base AS (
                  {base_sql}
              ) SELECT 
                * 
              FROM 
                base 
              WHERE 
                customer_id >= {start} AND customer_id < {end}
            throttle:
              min: 1000
              max: 6000
              factor: 1.2
              jitter: true