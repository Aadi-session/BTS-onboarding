name: sujathadepotscanner
version: v1
type: workflow
tags:
  - sample_scan
description: The workflow scans the schema and tables from postgres and registers the metadata in Metis
workflow:
  dag:
    - name: training-scanner
      spec:
        stack: scanner:2.0
        compute: runnable-default
        runAsUser: metis
        stackSpec:
          depot: dataos://sujathadepot