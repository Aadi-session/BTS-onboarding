version: v1
name: wf-customer-360
type: workflow
tags:
  - Tier.Gold
description: This workflow is responsible for Sample data for analysis and insights from postgres into Icebase.
workflow:
  title: conversation Dataset
  dag:
    - name: dg-customer-360
      description: This workflow is responsible for Sample data for analysis and insights from postgres into Icebase.
      title: conversation Dataset
      spec:
        tags:
          - Tier.Gold
        stack: flare:7.0
        compute: runnable-default
        stackSpec:
          driver:
            coreLimit: 1200m
            cores: 1
            memory: 2024m
          executor:
            coreLimit: 2200m
            cores: 2
            instances: 2
            memory: 4024m
          job:
            explain: true
            inputs:
              - name: customers
                dataset: dataos://sujathadepot:public/customers?acl=r
                options:
                  driver: org.postgresql.Driver

              - name: orders
                dataset: dataos://sujathadepot:public/orders?acl=r
                options:
                  driver: org.postgresql.Driver

              - name: customer_events
                dataset: dataos://sujathadepot:public/customer_events?acl=r
                options:
                  driver: org.postgresql.Driver
                

            outputs:
              - name: final_step
                dataset: dataos://icebase:sujathaschema/customer_360_dataset?acl=rw
                format: Iceberg
                description: The conversation table is a structured dataset that contains comprehensive information about customer feedback and engagement. It serves as a repository for conversation data, facilitating efficient management, analysis, and decision-making processes related to user engagement and feedback.
                tags:
                   - Tier.Gold
                options:
                  saveMode: append
                  iceberg:
                    properties:
                      write.format.default: parquet
                title: Conversation Context Dataset
            steps:
              - sequence:
                  - name: final_step
                    sql: |
                        SELECT
                          c.customer_id,
                          c.full_name,
                          c.email,
                          c.phone,
                          c.city,
                          c.signup_date,
                          c.status AS customer_status,
                          o.order_id,
                          o.product_name,
                          o.amount,
                          o.order_status,
                          o.order_time,
                          e.event_id,
                          e.event_type,
                          e.event_channel,
                          e.event_value,
                          e.event_time
                        FROM customers c
                        LEFT JOIN orders o
                            ON c.customer_id = o.customer_id
                        LEFT JOIN customer_events e
                          ON c.customer_id = e.customer_id
                                            