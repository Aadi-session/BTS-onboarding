name: soda-customer-events-quality-minerva
version: v1
type: workflow
tags:
  - workflow
  - soda-checks
description: Applying quality checks for the customer events data
workspace: public

workflow:
  # schedule:
  #   cron: '00 08 * * *'
  #   concurrencyPolicy: Forbid
  dag:
    - name: soda-customer-events-quality
      spec:
        stack: soda+python:1.0
        compute: runnable-default
        resources:
          requests:
            cpu: 1000m
            memory: 250Mi
          limits:
            cpu: 1000m
            memory: 250Mi
        logLevel: INFO

        stackSpec:
          inputs:
            - dataset: dataos://sujathadepot:public/customer_events
              options:
                engine: minerva
                clusterName: training
              profile:
                columns:
                  - include *
              checks:
                - schema:
                    name: Validate schema for customer events dataset
                    fail:
                      when wrong column type:
                        event_id: integer
                        customer_id: integer
                        event_type: varchar
                        event_channel: varchar
                        event_value: varchar
                        event_time: date
                    attributes:
                      category: Schema

                - missing_count(event_id) = 0:
                    name: Event ID should not be missing
                    attributes:
                      category: Completeness

                - duplicate_count(event_id) = 0:
                    name: Event ID should not be duplicated
                    attributes:
                      category: Uniqueness

                - invalid_count(event_id) = 0:
                    name: Event ID should be greater than zero
                    valid min: 1
                    attributes:
                      category: Validity

                - missing_count(customer_id) = 0:
                    name: Customer ID should not be missing in events
                    attributes:
                      category: Completeness

                - invalid_count(customer_id) = 0:
                    name: Customer ID in events should be greater than zero
                    valid min: 1
                    attributes:
                      category: Validity

                - missing_count(event_type) = 0:
                    name: Event type should not be missing
                    attributes:
                      category: Completeness

                - invalid_count(event_channel) = 0:
                    name: Event channel should be valid
                    valid values:
                      - web
                      - mobile
                      - app
                    attributes:
                      category: Validity

                - freshness(event_time) < 3650d:
                    name: Event date should be reasonably recent
                    attributes:
                      category: Freshness

                - avg_length(event_type) > 2:
                    name: Average length of event type should be greater than 2
                    attributes:
                      category: Accuracy

                - avg_length(event_value) > 2:
                    name: Average length of event value should be greater than 2
                    attributes:
                      category: Accuracy