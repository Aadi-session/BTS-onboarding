tables:
  - name: customer_360_dataset
    sql: {{ load_sql('customer_360_dataset') }}
    description: Unified customer 360 dataset combining customer profile details, order transactions, and customer interaction events into a single source for analytics and reporting.
    data_source: icebase
    public: true

    dimensions:
      - name: customer_id
        description: Unique identifier for the customer.
        type: number
        sql: customer_id
        primary_key: true
        public: true

      - name: full_name
        description: Full name of the customer.
        type: string
        sql: full_name

      - name: email
        description: Email address of the customer.
        type: string
        sql: email

      - name: phone
        description: Phone number of the customer.
        type: number
        sql: phone

      - name: city
        description: City associated with the customer.
        type: string
        sql: city

      - name: signup_date
        description: Date when the customer signed up.
        type: time
        sql: signup_date

      - name: customer_status
        description: Current status of the customer, such as active or inactive.
        type: string
        sql: customer_status

      - name: order_id
        description: Unique identifier for the order.
        type: number
        sql: order_id

      - name: product_name
        description: Name of the product purchased by the customer.
        type: string
        sql: product_name

      - name: amount
        description: Monetary amount associated with the order.
        type: number
        sql: amount

      - name: order_status
        description: Current status of the order such as pending, shipped, completed, or cancelled.
        type: string
        sql: order_status

      - name: order_time
        description: Date when the order was placed.
        type: time
        sql: order_time

      - name: event_id
        description: Unique identifier for the customer event.
        type: number
        sql: event_id

      - name: event_type
        description: Type of customer event such as login, page_view, add_to_cart, or payment.
        type: string
        sql: event_type

      - name: event_channel
        description: Channel through which the event occurred, such as web, mobile, or app.
        type: string
        sql: event_channel

      - name: event_value
        description: Additional value or payload associated with the event.
        type: string
        sql: event_value

      - name: event_time
        description: Date when the customer event occurred.
        type: time
        sql: event_time

      - name: metadata
        description: System metadata associated with the record.
        type: string
        sql: __metadata
        public: false

    segments:
      - name: active_customers
        sql: "{TABLE.customer_status} = 'active'"
        description: Filters records for active customers.

      - name: inactive_customers
        sql: "{TABLE.customer_status} = 'inactive'"
        description: Filters records for inactive customers.

      - name: completed_orders
        sql: "{TABLE.order_status} = 'completed'"
        description: Filters records for completed orders.

      - name: cancelled_orders
        sql: "{TABLE.order_status} = 'cancelled'"
        description: Filters records for cancelled orders.

      - name: web_events
        sql: "{TABLE.event_channel} = 'web'"
        description: Filters records for events generated through the web channel.

      - name: mobile_events
        sql: "{TABLE.event_channel} = 'mobile'"
        description: Filters records for events generated through the mobile channel.

      - name: app_events
        sql: "{TABLE.event_channel} = 'app'"
        description: Filters records for events generated through the app channel.

      - name: today_orders
        sql: "date({TABLE.order_time}) = current_date"
        description: Filters records for orders created today.

      - name: today_events
        sql: "date({TABLE.event_time}) = current_date"
        description: Filters records for customer events created today.

      - name: last_7_days_events
        sql: "{TABLE.event_time} between current_date - interval '7' day and current_date"
        description: Filters customer events from the last 7 days.

    measures:
      - name: total_customers
        sql: customer_id
        type: count_distinct
        description: Total number of distinct customers.

      - name: total_orders
        sql: order_id
        type: count
        description: Total number of orders.

      - name: total_events
        sql: event_id
        type: count
        description: Total number of customer events.

      - name: total_revenue
        sql: amount
        type: sum
        description: Total revenue generated from all orders.

      - name: average_order_value
        sql: amount
        type: avg
        description: Average monetary value per order.

      - name: unique_products
        sql: product_name
        type: count_distinct
        description: Total number of distinct products purchased.

      - name: unique_event_types
        sql: event_type
        type: count_distinct
        description: Total number of distinct customer event types.

      - name: completed_order_count
        sql: "CASE WHEN {TABLE.order_status} = 'completed' THEN {TABLE.order_id} END"
        type: count
        description: Number of completed orders.

      - name: cancelled_order_count
        sql: "CASE WHEN {TABLE.order_status} = 'cancelled' THEN {TABLE.order_id} END"
        type: count
        description: Number of cancelled orders.

      - name: active_customer_count
        sql: "CASE WHEN {TABLE.customer_status} = 'active' THEN {TABLE.customer_id} END"
        type: count_distinct
        description: Number of active customers.

      - name: inactive_customer_count
        sql: "CASE WHEN {TABLE.customer_status} = 'inactive' THEN {TABLE.customer_id} END"
        type: count_distinct
        description: Number of inactive customers.

      - name: web_event_count
        sql: "CASE WHEN {TABLE.event_channel} = 'web' THEN {TABLE.event_id} END"
        type: count
        description: Number of events triggered through the web channel.

      - name: mobile_event_count
        sql: "CASE WHEN {TABLE.event_channel} = 'mobile' THEN {TABLE.event_id} END"
        type: count
        description: Number of events triggered through the mobile channel.

      - name: app_event_count
        sql: "CASE WHEN {TABLE.event_channel} = 'app' THEN {TABLE.event_id} END"
        type: count
        description: Number of events triggered through the app channel.